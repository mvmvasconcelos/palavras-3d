<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalizar: {{ model.name }} | Palavras-3D</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&family=Bangers&family=Chewy&family=Fredoka+One&family=Lobster&family=Patrick+Hand&family=Righteous&family=Russo+One&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/three@0.137.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.137.0/examples/js/loaders/STLLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.137.0/examples/js/exporters/3MFExporter.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.137.0/examples/js/controls/OrbitControls.js"></script>
    <!-- Injection of model variables for JS -->
    <script>
        window.CURRENT_MODEL_ID = "{{ model.id }}";
        window.MODEL_FEATURES = {{ model.features | tojson | safe }};
    </script>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar Controls -->
        <aside class="sidebar">
            <div class="header">
                <h2><a href="/model/{{ model.id }}" style="color:white; text-decoration:none;">← Voltar</a> |
                    Personalizar</h2>
                <div class="model-info">
                    <h3>{{ model.name }}</h3>
                </div>
            </div>

            <!-- Dynamic DOM container -->
            <div class="sidebar-content" id="dynamic-form-container" style="overflow-y: auto; padding-right: 5px;">
                <p>Carregando opções...</p>
            </div>

            <div class="sidebar-content" style="padding-top: 0;">
                <div class="control-group">
                    <button id="generateBtn" class="primary-btn" disabled>Carregando Parametros...</button>
                    <div id="dimensions-info" style="margin-top: 10px; font-size: 0.9em; color: #aaa; display:none;">
                        Dimensões estimadas: <span id="dims-val">--</span>
                    </div>
                    <a id="downloadBtn" class="secondary-btn" style="display:none" download>Download STL (Peça
                        Inteira)</a>
                    <a id="downloadZipBtn" class="secondary-btn"
                        style="display:none; background-color: #e67e22; color: #ffffff !important; margin-top: 5px; text-decoration: none;"
                        download>Download ZIP (STL-Parts)</a>
                    <a id="download3mfBtn" class="secondary-btn"
                        style="display:none; background-color: #27ae60; color: #ffffff !important; margin-top: 5px; text-decoration: none; cursor: pointer;">Download
                        3MF (Bambu/Prusa)</a>
                </div>
            </div>
        </aside>

        <!-- 3D Viewer Area -->
        <main class="viewer-area">
            <!-- 2D Live Preview Overlay (Shown only if features include preview2d) -->
            <div id="preview-2d-container" style="display: none;">
                <div class="preview-label">Preview 2D (Tempo real)</div>
                <div id="preview-text"></div>
            </div>

            <div id="viewer"></div>
            <div class="loading-overlay" id="loading" style="display: none;">
                <div class="loading-box">
                    <p id="loading-text">Gerando modelo, por favor aguarde...</p>
                    <div class="progress-bar-container">
                        <div id="progress-bar" class="progress-bar-fill"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modular JS -->
    <script>
        document.write('<script src="/static/js/form.js?v=' + Date.now() + '"><\/script>');
        document.write('<script src="/static/js/viewer.js?v=' + Date.now() + '"><\/script>');
    </script>
</body>

</html>
