<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ model.name }} | Palavras-3D</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .product-container {
            max-width: 900px;
            margin: 40px auto;
            background: #2a2a2a;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: row;
        }

        .product-image {
            width: 50%;
            background: #111;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .product-details {
            width: 50%;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .product-details h1 {
            margin: 0 0 15px 0;
            color: #4facfe;
            font-size: 2rem;
        }

        .product-details p {
            color: #ccc;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn-personalize {
            display: inline-block;
            background: #27ae60;
            color: white;
            padding: 15px 30px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            text-align: center;
            transition: background 0.2s;
        }

        .btn-personalize:hover {
            background: #219653;
        }

        .back-link {
            display: inline-block;
            margin: 20px;
            color: #aaa;
            text-decoration: none;
        }

        .back-link:hover {
            color: #fff;
        }
    </style>
</head>

<body
    style="margin: 0; background-color: #1a1a1a; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">

    <a href="/" class="back-link">← Voltar para a Galeria</a>

    <div class="product-container">
        <div class="product-image">
            <img src="{{ model.thumbnail }}" alt="{{ model.name }}"
                onerror="this.src='https://via.placeholder.com/500x500?text=Foto+do+Modelo'">
        </div>
        <div class="product-details">
            <h1>{{ model.name }}</h1>
            <p>{{ model.description }}</p>

            <a href="/model/{{ model.id }}/editor" class="btn-personalize">🚀 Personalizar Modelo</a>
        </div>
    </div>

</body>

</html>
