<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palavras 3D - Generator</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Anton&family=Bangers&family=Dancing+Script:wght@700&family=Fredoka+One&family=Lobster&family=Montserrat:wght@700&family=Pacifico&family=Playfair+Display:wght@700&family=Roboto:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <!-- Import Maps for clean module functionality without bundlers -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
            "manifold-3d": "https://cdn.jsdelivr.net/npm/manifold-3d@2.5.1/manifold.js",
            "opentype.js": "https://unpkg.com/opentype.js@1.3.4/dist/opentype.module.js"
        }
    }
    </script>
</head>

<body>
    <div id="app">
        <!-- Sidebar Controls -->
        <aside id="sidebar">
            <h1>Palavras 3D</h1>

            <!-- Section: Text & Font -->
            <div class="divider">Texto e Tipografia</div>
            <div class="control-group">
                <label>Texto do Modelo</label>
                <input type="text" id="textLine1" value="Vinicius" placeholder="Digite seu texto...">
            </div>

            <div class="control-group">
                <label for="fontSelect">Escolher Fonte</label>
                <select id="fontSelect">
                    <option value="Roboto" style="font-family: 'Roboto';">Roboto (Moderno)</option>
                    <option value="Montserrat" style="font-family: 'Montserrat';">Montserrat (Sólido)</option>
                    <option value="Bangers" style="font-family: 'Bangers';">Bangers (Cartoon)</option>
                    <option value="Anton" style="font-family: 'Anton';">Anton (Impacto)</option>
                    <option value="Fredoka One" style="font-family: 'Fredoka One';">Fredoka (Arredondado)</option>
                    <option value="Pacifico" style="font-family: 'Pacifico';">Pacifico (Manuscrito)</option>
                    <option value="Dancing Script" style="font-family: 'Dancing Script';">Dancing (Elegante)</option>
                    <option value="Lobster" style="font-family: 'Lobster';">Lobster (Clássico)</option>
                    <option value="Playfair Display" style="font-family: 'Playfair Display';">Playfair (Sério)</option>
                </select>
            </div>

            <div class="control-group">
                <label for="fontThickness">Grossura / Peso (Offset mm)</label>
                <div class="slider-container">
                    <input type="range" id="fontThickness" value="0" min="-1" max="2" step="0.1">
                    <span id="fontThicknessValue">0mm</span>
                </div>
            </div>

            <div class="control-group">
                <label for="letterSpacing">Espaçamento entre Letras (mm)</label>
                <input type="number" id="letterSpacing" value="0.0" min="-10" max="10" step="0.1">
            </div>

            <div class="control-group">
                <label for="fontSize">Tamanho da Fonte (mm)</label>
                <input type="number" id="fontSize" value="20" min="5" max="100">
            </div>

            <div class="control-group">
                <label for="height">Altura Total (Espessura mm)</label>
                <input type="number" id="height" value="12" min="10" max="50">
            </div>

            <!-- Pen Topper Settings -->
            <div class="divider">Configurações do Enfeite (Lápis/Caneta)</div>

            <div class="control-group">
                <label for="holeDiameter">Diâmetro / Lado do Furo (mm)</label>
                <input type="number" id="holeDiameter" value="7.5" min="2" max="20" step="0.5">
            </div>

            <div class="control-group">
                <label>Tipo de Furo</label>
                <div class="btn-group" id="holeTypeGroup">
                    <button type="button" class="type-btn active" data-value="circle" title="Circular">○</button>
                    <button type="button" class="type-btn" data-value="hex" title="Hexagonal">⬢</button>
                    <button type="button" class="type-btn" data-value="square" title="Quadrado">□</button>
                    <button type="button" class="type-btn" data-value="triangle" title="Triângulo">△</button>
                </div>
            </div>

            <div class="control-group">
                <label for="holeOrientation">Orientação do Furo</label>
                <select id="holeOrientation">
                    <option value="horizontal">Horizontal (Atravessa a palavra)</option>
                    <option value="vertical">Vertical (De cima para baixo)</option>
                </select>
            </div>

            <button id="btnGenerate" class="primary-btn">Gerar Modelo 3D</button>
            <button id="btnDownload" class="secondary-btn" disabled>Baixar STL</button>

            <div id="status" class="status-msg">Pronto</div>
        </aside>

        <!-- 3D Viewer -->
        <main id="viewer">
            <div id="loadingOverlay">
                <div class="spinner"></div>
                <div id="loadingText">Carregando bibliotecas...</div>
            </div>
        </main>
    </div>

    <!-- App Entry Point -->
    <script type="module" src="js/main.js?v=2.96"></script>
</body>

</html>
